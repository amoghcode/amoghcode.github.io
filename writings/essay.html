<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Essay — Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --bg2: #ede8df;
      --bg3: #e5dfd4;
      --border: #d8d0c4;
      --text: #1a1814;
      --muted: #8a8070;
      --accent: #2d6a2d;
      --accent2: #b05c1a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 1.25rem 2.5rem 1rem;
      background: rgba(245,240,232,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-links { display: flex; gap: 2rem; list-style: none; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--text);
      transition: width 0.25s ease;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: var(--text); font-weight: 500; }
    .nav-links a.active::after { width: 100%; }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 660px;
      margin: 0 auto;
      padding: 8rem 2rem 6rem;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 3rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    /* ── ESSAY HEADER ── */
    .essay-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .essay-tag {
      text-transform: uppercase;
      color: var(--accent2);
      letter-spacing: 0.12em;
    }

    .essay-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── ESSAY BODY ── */
    .essay-body {
      font-family: 'Lora', serif;
      font-size: 1rem;
      line-height: 1.85;
      color: var(--text);
    }

    .essay-body p { margin-bottom: 1.5rem; }
    .essay-body p:last-child { margin-bottom: 0; }

    .essay-body h1 {
      /* h1 is used for the essay title in markdown — we hide it here
         since we already display it from the registry metadata */
      display: none;
    }

    .essay-body h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      letter-spacing: -0.01em;
    }

    .essay-body h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
    }

    .essay-body blockquote {
      border-left: 2px solid var(--border);
      padding-left: 1.25rem;
      margin: 1.75rem 0;
      color: var(--muted);
      font-style: italic;
    }

    .essay-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .essay-body a:hover { color: var(--accent2); }

    .essay-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    .essay-body code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85em;
      background: var(--bg2);
      padding: 0.15em 0.4em;
      border-radius: 2px;
    }

    .essay-body ul, .essay-body ol {
      margin: 0 0 1.5rem 1.5rem;
    }

    .essay-body li { margin-bottom: 0.4rem; }

    /* ── PREV / NEXT NAVIGATION ── */
    .essay-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      margin-top: 4rem;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .essay-nav-item {
      background: var(--bg);
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .essay-nav-item:hover { background: var(--bg2); }

    .essay-nav-item.next { text-align: right; }

    .essay-nav-item.empty {
      pointer-events: none;
      opacity: 0;
    }

    .essay-nav-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .essay-nav-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── FOOTER ── */
    .essay-footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── ERROR STATE ── */
    .error-state {
      padding: 3rem 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .error-state h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 1rem;
    }

    @media (max-width: 600px) {
      nav { padding: 1rem 1.25rem; }
      main { padding: 7rem 1.25rem 4rem; }
      .essay-nav { grid-template-columns: 1fr; }
      .essay-nav-item.next { text-align: left; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-logo">YN</a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../index.html" id="nav-writings" class="active">Writings</a></li>
      <li><a href="../index.html">Projects</a></li>
    </ul>
  </nav>

  <main id="main-content">
    <!-- Content is injected here by JavaScript -->
    <p style="color: var(--muted); font-size: 0.8rem;">Loading...</p>
  </main>

  <!-- Load the essay registry first, then the markdown parser, then our app logic -->
  <script src="essays.js"></script>

  <script>
    // ─────────────────────────────────────────────────────────────
    //  MINIMAL MARKDOWN PARSER
    //  Converts the markdown you write into HTML the browser can render.
    //  Supports: headings, bold, italic, blockquotes, code, links,
    //  horizontal rules, unordered + ordered lists, paragraphs.
    // ─────────────────────────────────────────────────────────────
    function parseMarkdown(md) {
      const lines = md.split('\n');
      let html = '';
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];

        // Blank line
        if (line.trim() === '') { i++; continue; }

        // Headings
        if (/^### (.+)/.test(line)) {
          html += `<h3>${inline(line.replace(/^### /, ''))}</h3>\n`;
          i++; continue;
        }
        if (/^## (.+)/.test(line)) {
          html += `<h2>${inline(line.replace(/^## /, ''))}</h2>\n`;
          i++; continue;
        }
        if (/^# (.+)/.test(line)) {
          html += `<h1>${inline(line.replace(/^# /, ''))}</h1>\n`;
          i++; continue;
        }

        // Horizontal rule
        if (/^---+$/.test(line.trim())) {
          html += `<hr>\n`;
          i++; continue;
        }

        // Blockquote
        if (/^> /.test(line)) {
          let content = '';
          while (i < lines.length && /^> /.test(lines[i])) {
            content += inline(lines[i].replace(/^> /, '')) + ' ';
            i++;
          }
          html += `<blockquote><p>${content.trim()}</p></blockquote>\n`;
          continue;
        }

        // Unordered list
        if (/^[-*] /.test(line)) {
          html += '<ul>\n';
          while (i < lines.length && /^[-*] /.test(lines[i])) {
            html += `<li>${inline(lines[i].replace(/^[-*] /, ''))}</li>\n`;
            i++;
          }
          html += '</ul>\n';
          continue;
        }

        // Ordered list
        if (/^\d+\. /.test(line)) {
          html += '<ol>\n';
          while (i < lines.length && /^\d+\. /.test(lines[i])) {
            html += `<li>${inline(lines[i].replace(/^\d+\. /, ''))}</li>\n`;
            i++;
          }
          html += '</ol>\n';
          continue;
        }

        // Paragraph — collect consecutive non-special lines
        let para = '';
        while (
          i < lines.length &&
          lines[i].trim() !== '' &&
          !/^#{1,3} /.test(lines[i]) &&
          !/^[-*] /.test(lines[i]) &&
          !/^\d+\. /.test(lines[i]) &&
          !/^> /.test(lines[i]) &&
          !/^---+$/.test(lines[i].trim())
        ) {
          para += (para ? ' ' : '') + lines[i];
          i++;
        }
        if (para) html += `<p>${inline(para)}</p>\n`;
      }

      return html;
    }

    // Inline formatting: bold, italic, code, links
    function inline(text) {
      return text
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    // ─────────────────────────────────────────────────────────────
    //  PAGE LOADER
    //  Reads the ?slug= URL parameter, finds the essay in ESSAYS,
    //  fetches the .md file, parses it, and renders everything.
    // ─────────────────────────────────────────────────────────────
    async function loadEssay() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const main = document.getElementById('main-content');

      // Find the essay in the registry
      const index = ESSAYS.findIndex(e => e.slug === slug);

      if (!slug || index === -1) {
        main.innerHTML = `
          <a href="../index.html" class="back-link">← All Writings</a>
          <div class="error-state">
            <h2>Essay not found</h2>
            <p>The essay you're looking for doesn't exist yet — or the link is wrong.</p>
          </div>`;
        return;
      }

      const essay = ESSAYS[index];
      const prev  = ESSAYS[index + 1] || null;  // older essay
      const next  = ESSAYS[index - 1] || null;  // newer essay

      // Update page title
      document.title = `${essay.title} — Your Name`;

      // Fetch the markdown file
      let bodyHTML = '';
      try {
        const res = await fetch(`posts/${essay.slug}.md`);
        if (!res.ok) throw new Error('not found');
        const md = await res.text();
        bodyHTML = parseMarkdown(md);
      } catch {
        bodyHTML = '<p>Essay content could not be loaded. Make sure the .md file exists in the posts/ folder.</p>';
      }

      // Build prev/next nav
      const prevHTML = prev
        ? `<a href="essay.html?slug=${prev.slug}" class="essay-nav-item prev">
            <span class="essay-nav-label">← Older</span>
            <span class="essay-nav-title">${prev.title}</span>
           </a>`
        : `<div class="essay-nav-item empty"></div>`;

      const nextHTML = next
        ? `<a href="essay.html?slug=${next.slug}" class="essay-nav-item next">
            <span class="essay-nav-label">Newer →</span>
            <span class="essay-nav-title">${next.title}</span>
           </a>`
        : `<div class="essay-nav-item empty"></div>`;

      // Render everything
      main.innerHTML = `
        <a href="../index.html" class="back-link">← All Writings</a>

        <div class="essay-meta">
          <span class="essay-tag">${essay.tag}</span>
          <span>·</span>
          <span>${essay.date}</span>
          <span>·</span>
          <span>${essay.readingTime}</span>
        </div>

        <h1 class="essay-title">${essay.title}</h1>

        <div class="essay-body">${bodyHTML}</div>

        <nav class="essay-nav" aria-label="Essay navigation">
          ${prevHTML}
          ${nextHTML}
        </nav>

        <div class="essay-footer">
          <span>Your Name</span>
          <a href="../index.html" class="back-link" style="margin-bottom:0">← All Writings</a>
        </div>
      `;
    }

    loadEssay();
  </script>

</body>
</html>
